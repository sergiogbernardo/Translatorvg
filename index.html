<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Translatorvg — versão GitHub Pages do tradutor com histórico, idiomas e tradução de texto."
    />
    <title>Translatorvg</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <main class="shell">
      <header class="hero card">
        <div class="hero__copy">
          <h1>Translatorvg</h1>
        </div>

        <div class="hero__status">
          <span class="status-dot" id="apiDot"></span>
          <div>
            <p class="status-label">Translation API</p>
            <p class="status-value" id="apiStatus">MyMemory online</p>
          </div>
        </div>
      </header>

      <section class="layout">
        <div class="column">
          <section class="card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Texto</p>
                <h2>Traduzir texto</h2>
              </div>
              <div class="section-actions">
                <button class="chip" id="swapLanguages" type="button" aria-label="Trocar idiomas">⇄</button>
                <button class="chip" id="toggleFavorite" type="button">Favoritar</button>
                <button class="chip" id="copyResult" type="button">Copiar</button>
                <button class="chip" id="speakResult" type="button">Ouvir</button>
              </div>
            </div>

            <div class="lang-grid">
              <label>
                <span>Origem</span>
                <select id="sourceLang"></select>
              </label>
              <label>
                <span>Destino</span>
                <select id="targetLang"></select>
              </label>
            </div>

            <label class="field">
              <span>Texto de entrada</span>
              <textarea
                id="sourceText"
                rows="8"
                placeholder="Digite ou cole o texto aqui…"
              ></textarea>
            </label>

            <div class="inline-actions">
              <button class="btn btn--primary" id="translateBtn" type="button">Traduzir</button>
              <button class="btn btn--secondary" id="clearBtn" type="button">Limpar</button>
            </div>

            <div class="result card card--inner">
              <div class="result__head">
                <div>
                  <p class="eyebrow">Resultado</p>
                  <h3 id="resultTitle">Pronto para traduzir</h3>
                </div>
                <span class="badge" id="detectedBadge">Auto-detect</span>
              </div>
              <p class="result__text" id="resultText">O texto traduzido aparece aqui.</p>
            </div>
          </section>
        </div>

        <aside class="column column--side">
          <section class="card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Histórico</p>
                <h2>Últimas traduções</h2>
              </div>
              <button class="chip" id="clearHistory" type="button">Limpar</button>
            </div>
            <div class="stack" id="historyList"></div>
          </section>

          <section class="card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Favoritos</p>
                <h2>Pares salvos</h2>
              </div>
            </div>
            <div class="stack" id="favoritesList"></div>
          </section>
        </aside>
      </section>
    </main>

    <template id="historyItemTemplate">
      <button class="history-item" type="button">
        <strong></strong>
        <span></span>
      </button>
    </template>

    <template id="favoriteItemTemplate">
      <button class="favorite-item" type="button"></button>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
