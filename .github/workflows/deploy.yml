name: Deploy Translatorvg to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-translatorvg
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html app.js styles.css .nojekyll _site/
          cp favicon.ico favicon-16x16.png favicon-32x32.png favicon-48x48.png apple-touch-icon.png hub-icon.png _site/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
